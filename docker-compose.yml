version: "3"

# Limite de tamanho dos logs de stdout/stderr dos containers (driver json-file).
# Evita que /var/lib/docker/containers/*/*-json.log cresça sem limite.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:12
    logging: *default-logging
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes:
      - ./pg-airflow:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "127.0.0.1:${AIRFLOW_POSTGRES_PORT}:5432"
    container_name: "airflow-db-${AIRFLOW_ENV_TYPE}-${AIRFLOW_ENV_NAME}"
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    logging: *default-logging
    hostname: webserver
    restart: on-failure
    depends_on:
      - postgres
    command: webserver
    env_file:
      - .env
    # NOTA: AIRFLOW__LOGGING__LOG_RETENTION_DAYS / LOG_CLEANUP_ENABLED NÃO são
    # chaves nativas do Airflow (não fazem nada). A retenção real dos logs é feita
    # no host pelo script /opt/dadosgov-metrics/prune-logs.sh, agendado pelo
    # systemd timer 'dadosgov-metrics-logclean.timer' (diário, retém 3 dias).
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./requirements.txt:/opt/airflow/requirements.txt
    ports:
      - "127.0.0.1:${AIRFLOW_WEBSERVER_PORT}:8080"
      - "127.0.0.1:${AIRFLOW_LOG_SERVER_PORT}:8793"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ./scripts/airflow-entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "[ -f /opt/airflow/airflow-webserver.pid ]"]
      interval: 30s
      timeout: 30s
      retries: 32
    container_name: "airflow-${AIRFLOW_ENV_TYPE}-${AIRFLOW_ENV_NAME}"
